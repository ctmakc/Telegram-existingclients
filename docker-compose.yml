version: "3.8"

services:
  bot:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY:-YOUR_GITHUB_USERNAME/telegram-existingclients}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    # Optional ops service; start only when profile is enabled.
    profiles: ["watchtower"]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true

volumes:
  bot-data:
