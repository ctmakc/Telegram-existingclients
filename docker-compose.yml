version: "3.8"

services:
  bot:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY:-YOUR_GITHUB_USERNAME/telegram-existingclients}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - SUPERADMIN_IDS=${SUPERADMIN_IDS}
      - ADMIN_IDS=${ADMIN_IDS:-}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-ru}
      - DB_PATH=${DB_PATH:-data/bot.sqlite3}
      - CATALOG_SOURCE_URL=${CATALOG_SOURCE_URL:-https://minimelts.es/sabores/}
      - BOT_VERSION=${BOT_VERSION:-dev}
      - IMAGE_TAG=${IMAGE_TAG:-latest}
      - SCHEDULE_OPEN=${SCHEDULE_OPEN:-MON:09:00,THU:09:00}
      - SCHEDULE_CLOSE=${SCHEDULE_CLOSE:-WED:20:00,SAT:20:00}
      - REMINDER_HOURS_BEFORE=${REMINDER_HOURS_BEFORE:-4}
      - TIMEZONE=${TIMEZONE:-Europe/Madrid}
    volumes:
      - bot-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    # Optional ops service; start only when profile is enabled.
    profiles: ["watchtower"]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true

volumes:
  bot-data:
